<index.html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ArtArchive | Kids Artwork Tracker</title>
    
    <link rel="manifest" href="./manifest.json">
    <link rel="apple-touch-icon" href="apple-icon.png">
    <meta name="theme-color" content="#6366f1">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;800;900&display=swap');
        body { 
            font-family: 'Nunito', sans-serif; 
            background-color: #f8fafc;
            background-image: radial-gradient(#cbd5e1 1.5px, transparent 1.5px);
            background-size: 30px 30px;
            overscroll-behavior-y: none; 
        }
        
        .smooth-scroll {
            -webkit-overflow-scrolling: touch;
            overscroll-behavior: contain;
        }

        .btn-3d { transition: all 0.1s ease; }
        .btn-3d:active {
            transform: translateY(4px);
            box-shadow: 0 0px 0 0 transparent !important;
        }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        .emoji-grid-item {
            transition: all 0.15s ease;
            cursor: pointer;
            border: 3px solid transparent;
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.75rem;
            padding: 6px;
            background: white;
        }
        .emoji-grid-item:hover { transform: scale(1.25); background: #eef2ff; border-color: #a5b4fc; z-index: 2; }
        .emoji-grid-item.selected { border-color: #6366f1; background: #e0e7ff; transform: scale(1.15); box-shadow: 0 0 0 3px rgba(99,102,241,0.3); }
        
        .color-swatch { width: 36px; height: 36px; border-radius: 50%; cursor: pointer; transition: all 0.15s ease; border: 3px solid transparent; position: relative; }
        .color-swatch:hover { transform: scale(1.2); }
        .color-swatch.selected { border-color: #1e293b; transform: scale(1.15); box-shadow: 0 0 0 3px rgba(30,41,59,0.2); }
        .color-swatch.selected::after { content: '✓'; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; color: white; font-weight: 900; font-size: 14px; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }
        
        .reaction-btn { transition: all 0.2s ease; cursor: pointer; user-select: none; }
        .reaction-btn:hover { transform: scale(1.3); }
        .reaction-btn:active { transform: scale(0.9); }
        .reaction-btn.active { background: #e0e7ff; border-color: #818cf8; }
        
        .reaction-fly { position: fixed; pointer-events: none; font-size: 2rem; z-index: 9999; animation: flyUp 0.8s ease-out forwards; }
        @keyframes flyUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-80px) scale(1.5); } }
        
        .card-enter { animation: cardPop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards; }
        @keyframes cardPop { 0% { opacity: 0; transform: scale(0.8) translateY(20px); } 100% { opacity: 1; transform: scale(1) translateY(0); } }
        
        .empty-bounce { animation: gentleBounce 2s ease-in-out infinite; }
        @keyframes gentleBounce { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
        
        .tab-count { background: rgba(255,255,255,0.3); font-size: 0.65rem; padding: 1px 6px; border-radius: 999px; font-weight: 800; }
        
        .fav-star { transition: all 0.2s ease; }
        .fav-star:hover { transform: scale(1.3); }
        .fav-star.active { color: #f59e0b; animation: starPop 0.3s ease; }
        @keyframes starPop { 0% { transform: scale(1); } 50% { transform: scale(1.4); } 100% { transform: scale(1); } }
        
        .preview-img { max-height: 120px; border-radius: 16px; object-fit: cover; border: 3px solid #e2e8f0; }
        
        .lightbox { animation: fadeIn 0.25s ease; }
        @keyframes fadeIn { 0% { opacity: 0; } 100% { opacity: 1; } }

        #loadingOverlay {
            position: fixed; inset: 0; background: rgba(255,255,255,0.9); z-index: 99999; 
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .spinner { border: 4px solid rgba(0, 0, 0, 0.1); width: 40px; height: 40px; border-radius: 50%; border-left-color: #6366f1; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="text-slate-800 h-[100dvh] overflow-hidden flex flex-col">

    <div id="loginOverlay" class="fixed inset-0 bg-slate-900/90 backdrop-blur-md z-[100000] flex items-center justify-center p-4">

            <div class="flex items-center gap-3">
                <div class="bg-indigo-500 text-white p-3 rounded-2xl shadow-md transform -rotate-6">
                    <i class="fa-solid fa-palette text-2xl"></i>
                </div>
                <div>
                    <h1 class="text-2xl md:text-3xl font-black text-indigo-700 tracking-tight">ArtArchive</h1>

            <div class="flex items-center gap-2 md:hidden">

        </div>

                <input type="text" id="searchInput" oninput="handleSearch()" placeholder="Search art..." class="bg-slate-100 border-2 border-slate-200 rounded-xl pl-9 pr-3 py-3 text-sm font-bold text-slate-700 outline-none w-40 focus:border-indigo-400 transition focus:w-56">

    <div id="mobileSearch" class="hidden bg-white px-4 py-2 border-b-2 border-slate-100 md:hidden shrink-0">

                    </div>
                </div>
                <button type="submit" id="uploadBtn" class="btn-3d w-full bg-indigo-600 text-white font-black text-lg py-4 rounded-xl shadow-[0_6px_0_rgb(67,56,202)] mt-4">Save to Archive! 🚀</button>
            </form>
        </div>
    </div>

    <div id="manageModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4">
        <div class="absolute inset-0 bg-slate-900/80 backdrop-blur-sm" onclick="closeManageModal()"></div>

                    <div>

                    </div>

                <p id="lightboxMeta" class="text-white/60 font-bold text-sm mt-1"></p>
            </div>
        </div>
    </div>

    <script>
        // ==========================================
        // FIREBASE CONFIGURATION
        // ==========================================
        const firebaseConfig = {
          apiKey: "AIzaSyD9IKm0uyrZ5qQi74jQ-ahKtKaoHxruQ8A",
          authDomain: "artarchive-a853f.firebaseapp.com",
          projectId: "artarchive-a853f",
          storageBucket: "artarchive-a853f.firebasestorage.app",
          messagingSenderId: "988485136427",
          appId: "1:988485136427:web:82bf2a97e4cefd7ec27a6e",
          measurementId: "G-2R4S0X7HKR"
        };
        
        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.firestore();
        const storage = firebase.storage();

        // ==========================================
        // AUTHENTICATION LOGIC
        // ==========================================
        auth.onAuthStateChanged(user => {
            if (user) {
                // User is signed in.
                document.getElementById('loginOverlay').classList.add('hidden');
                document.getElementById('loadingOverlay').style.display = 'flex';
                loadDataFromFirebase();
            } else {
                // No user is signed in.
                document.getElementById('loginOverlay').classList.remove('hidden');
                document.getElementById('loadingOverlay').style.display = 'none';
            }
        });

        document.getElementById('loginForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('loginEmail').value;
            const pass = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');
            const errorTxt = document.getElementById('loginError');
            
            btn.innerText = 'Checking...';
            btn.disabled = true;
            errorTxt.classList.add('hidden');

            auth.signInWithEmailAndPassword(email, pass)
                .then(() => {
                    btn.innerText = 'Unlock Archive 🔓';
                    btn.disabled = false;
                })
                .catch((error) => {
                    errorTxt.innerText = error.message;
                    errorTxt.classList.remove('hidden');
                    btn.innerText = 'Unlock Archive 🔓';
                    btn.disabled = false;
                });
        });

        function logout() {
            auth.signOut();
        }

        // ==========================================
        // APP LOGIC
        // ==========================================
        const emojiCategories = {

            'Fantasy': ['🦄','🦖','🐉','👽','🤖','👻','🎃','🧞','🧶','🪄'],
            'Space & Nature': ['🚀','🌟','🌈','🌸','🌻','🍀','🔥','❄️','🌊','⭐'],
            'Fun': ['🎨','🎭','🎪','🎸','🎮','🏆','🎯','🧩','🪁','🎈']
        };

        const moodEmojis = ['😍','🤩','😂','🥳','😎','🤔','😲','💪','🔥','✨','💖','🌈','🏆','👏','💯','🎉','😇','🤯','🥰','👑'];

        const colorOptions = [
            { class: 'bg-red-500', hex: '#ef4444', shadow: 'shadow-[0_4px_0_rgb(185,28,28)]' },
            { class: 'bg-orange-500', hex: '#f97316', shadow: 'shadow-[0_4px_0_rgb(194,65,12)]' },
            { class: 'bg-amber-500', hex: '#f59e0b', shadow: 'shadow-[0_4px_0_rgb(180,83,9)]' },
            { class: 'bg-yellow-400', hex: '#facc15', shadow: 'shadow-[0_4px_0_rgb(161,98,7)]' },
            { class: 'bg-lime-500', hex: '#84cc16', shadow: 'shadow-[0_4px_0_rgb(63,98,18)]' },
            { class: 'bg-emerald-500', hex: '#10b981', shadow: 'shadow-[0_4px_0_rgb(4,120,87)]' },
            { class: 'bg-teal-500', hex: '#14b8a6', shadow: 'shadow-[0_4px_0_rgb(13,148,136)]' },
            { class: 'bg-cyan-500', hex: '#06b6d4', shadow: 'shadow-[0_4px_0_rgb(14,116,144)]' },
            { class: 'bg-blue-500', hex: '#3b82f6', shadow: 'shadow-[0_4px_0_rgb(29,78,216)]' },
            { class: 'bg-indigo-500', hex: '#6366f1', shadow: 'shadow-[0_4px_0_rgb(67,56,202)]' },
            { class: 'bg-purple-500', hex: '#a855f7', shadow: 'shadow-[0_4px_0_rgb(109,40,217)]' },
            { class: 'bg-pink-500', hex: '#ec4899', shadow: 'shadow-[0_4px_0_rgb(190,24,93)]' },
            { class: 'bg-rose-500', hex: '#f43f5e', shadow: 'shadow-[0_4px_0_rgb(190,18,60)]' },
        ];

        let kids = [];
        let artworks = [];
        
        let activeTab = 'All';
        let editingKidId = null;
        let selectedEmoji = '👦';
        let selectedColor = 'bg-red-500';
        let selectedMood = '';
        let searchQuery = '';
        let sortMode = 'newest';

        const defaultKids = [
            { id: 'all', name: 'All', icon: '🌟', color: 'bg-slate-800', shadow: 'shadow-[0_4px_0_rgb(30,41,59)]', isBase: true },
            { id: 'k_default1', name: 'Artist 1', age: 5, class: 'Pre-K', icon: '👧', color: 'bg-pink-500', shadow: 'shadow-[0_4px_0_rgb(190,24,93)]', isBase: false },
            { id: 'k_default2', name: 'Artist 2', age: 3, class: 'Toddler', icon: '👦', color: 'bg-blue-500', shadow: 'shadow-[0_4px_0_rgb(29,78,216)]', isBase: false },
            { id: 'k_default3', name: 'Artist 3', age: 1, class: 'Baby', icon: '👶', color: 'bg-emerald-500', shadow: 'shadow-[0_4px_0_rgb(4,120,87)]', isBase: false }
        ];

        async function loadDataFromFirebase() {
            try {
                const kidsSnap = await db.collection('kids').get();
                if (!kidsSnap.empty) {
                    kids = kidsSnap.docs.map(doc => doc.data());
                } else {
                    kids = [...defaultKids];
                    kids.forEach(k => db.collection('kids').doc(k.id).set(k));
                }

                const artSnap = await db.collection('artworks').orderBy('id', 'desc').get();
                artworks = artSnap.docs.map(doc => doc.data());

                document.getElementById('loadingOverlay').style.display = 'none';
                updateAllUI();
            } catch (error) {
                console.error("Error loading data:", error);
                document.getElementById('loadingText').innerText = "Permission Denied. Check your Database Rules.";
                setTimeout(() => auth.signOut(), 3000);
            }
        }

        function saveKidToDB(kid) { db.collection('kids').doc(kid.id).set(kid); }
        function deleteKidFromDB(kidId) { db.collection('kids').doc(kidId).delete(); }
        function saveArtToDB(art) { db.collection('artworks').doc(art.id.toString()).set(art); }
        function deleteArtFromDB(artId) { db.collection('artworks').doc(artId.toString()).delete(); }

        document.addEventListener('DOMContentLoaded', () => {
            document.getElementById('artDate').valueAsDate = new Date();
            renderEmojiGrid(); renderColorSwatches(); renderMoodPicker(); setupImagePreview();
        });

        function updateAllUI() {
            renderTabs(); renderGallery(); renderUploadDropdown(); renderManageList();
        }

        function toggleSearch() {
            const el = document.getElementById('mobileSearch'); el.classList.toggle('hidden');
            if (!el.classList.contains('hidden')) document.getElementById('mobileSearchInput').focus();
        }

        function handleSearch() {
            searchQuery = (document.getElementById('searchInput')?.value || document.getElementById('mobileSearchInput')?.value || '').toLowerCase().trim();
            if (document.getElementById('searchInput')) document.getElementById('searchInput').value = searchQuery;
            if (document.getElementById('mobileSearchInput')) document.getElementById('mobileSearchInput').value = searchQuery;
            renderGallery();
        }

        function handleSort() { sortMode = document.getElementById('sortSelector').value; renderGallery(); }

        function renderEmojiGrid(filter = '') {
            const grid = document.getElementById('emojiGrid'); let html = '';
            for (const cat in emojiCategories) {
                const filtered = emojiCategories[cat].filter(e => { if (!filter) return true; return cat.toLowerCase().includes(filter.toLowerCase()); });
                if (filtered.length === 0) continue;
                html += `<div class="col-span-6 sm:col-span-8 text-xs font-black text-slate-400 uppercase tracking-wider pt-2 pb-1 px-1">${cat}</div>`;
                filtered.forEach(emoji => { html += `<div class="emoji-grid-item ${selectedEmoji === emoji ? 'selected' : ''}" onclick="selectEmoji('${emoji}')">${emoji}</div>`; });
            }
            if (!html) html = '<div class="col-span-6 sm:col-span-8 text-center text-slate-400 font-bold py-4">No emojis found</div>';
            grid.innerHTML = html;
        }

        function filterEmojis() { renderEmojiGrid(document.getElementById('emojiSearch').value); }
        function selectEmoji(emoji) { selectedEmoji = emoji; document.getElementById('newKidEmoji').value = emoji; renderEmojiGrid(document.getElementById('emojiSearch').value); }

        function renderColorSwatches() {
            const container = document.getElementById('colorSwatches');
            container.innerHTML = colorOptions.map(c => `<div class="color-swatch ${c.class === selectedColor ? 'selected' : ''}" style="background-color: ${c.hex}" onclick="selectColor('${c.class}')"></div>`).join('');
        }
        function selectColor(colorClass) { selectedColor = colorClass; document.getElementById('newKidColor').value = colorClass; renderColorSwatches(); }

        function renderMoodPicker() {
            const container = document.getElementById('moodPicker');
            container.innerHTML = moodEmojis.map(m => `<button type="button" class="reaction-btn text-xl p-1.5 rounded-lg border-2 border-transparent ${selectedMood === m ? 'active' : ''}" onclick="selectMood('${m}')">${m}</button>`).join('');
        }
        function selectMood(m) { selectedMood = selectedMood === m ? '' : m; renderMoodPicker(); }

        function setupImagePreview() {
            document.getElementById('artImage').addEventListener('change', function() {
                if (this.files && this.files[0]) {
                    const reader = new FileReader();
                    reader.onload = function(e) {
                        document.getElementById('previewImg').src = e.target.result;
                        document.getElementById('dropZoneContent').classList.add('hidden');
                        document.getElementById('imagePreview').classList.remove('hidden');
                        document.getElementById('imagePreview').classList.add('flex');
                    };
                    reader.readAsDataURL(this.files[0]);
                }
            });
        }
        function clearImagePreview() { document.getElementById('artImage').value = ''; document.getElementById('dropZoneContent').classList.remove('hidden'); document.getElementById('imagePreview').classList.add('hidden'); document.getElementById('imagePreview').classList.remove('flex'); }

        function renderTabs() {
            const tabsContainer = document.getElementById('kidsTabs');
            tabsContainer.innerHTML = kids.map(kid => {
                const count = kid.isBase ? artworks.length : artworks.filter(a => a.childName === kid.name).length;
                return `
                <button onclick="setActiveTab('${kid.name}')" class="btn-3d px-4 md:px-5 py-2.5 md:py-3 rounded-2xl font-black text-xs md:text-sm whitespace-nowrap transition-all flex items-center gap-1.5 md:gap-2 ${activeTab === kid.name ? `${kid.color} text-white ${kid.shadow} transform -translate-y-1` : 'bg-white text-slate-600 border-2 border-slate-200 shadow-[0_4px_0_rgb(226,232,240)]'}">
                    <span class="text-lg md:text-xl">${kid.icon}</span> ${kid.name} 
                    ${count > 0 ? `<span class="tab-count">${count}</span>` : ''}
                </button>`;
            }).join('');
        }
        function setActiveTab(name) { activeTab = name; renderTabs(); renderGallery(); }

        function renderGallery() {
            const gallery = document.getElementById('galleryGrid');
            let filteredArt = activeTab === 'All' ? [...artworks] : artworks.filter(art => art.childName === activeTab);
            
            if (searchQuery) filteredArt = filteredArt.filter(art => art.theme.toLowerCase().includes(searchQuery) || art.childName.toLowerCase().includes(searchQuery));
            if (sortMode === 'newest') filteredArt.sort((a, b) => b.id - a.id);
            else if (sortMode === 'oldest') filteredArt.sort((a, b) => a.id - b.id);
            else if (sortMode === 'alpha') filteredArt.sort((a, b) => a.theme.localeCompare(b.theme));

            if (filteredArt.length === 0) {
                const msg = searchQuery ? 'No results found' : 'No artwork here yet!';
                const icon = searchQuery ? '🔍' : '🖼️';
                gallery.innerHTML = `<div class="col-span-full flex flex-col items-center justify-center text-slate-400 py-16 md:py-20 bg-white/50 rounded-[2rem] md:rounded-[3rem] border-4 border-dashed border-slate-200 mt-4"><div class="text-6xl md:text-7xl mb-4 empty-bounce">${icon}</div><p class="text-lg md:text-2xl font-black text-slate-600 text-center px-4">${msg}</p></div>`;
                return;
            }

            gallery.innerHTML = filteredArt.map((art, index) => {
                const kidObj = kids.find(k => k.name === art.childName) || kids[0];
                const reactions = art.reactions || {};
                const reactionEmojis = ['❤️','😍','🔥','👏','🌟'];
                const isFav = art.favorite;
                
                return `
                <div class="bg-white rounded-[1.5rem] md:rounded-[2rem] border-4 border-slate-100 p-2.5 md:p-3 shadow-lg hover:-translate-y-1 transition group card-enter" style="animation-delay: ${index * 0.05}s">
                    <div class="h-44 md:h-56 overflow-hidden rounded-xl md:rounded-2xl bg-slate-100 relative border-2 border-slate-100 cursor-pointer" onclick="openLightbox(${art.id})">
                        <img src="${art.imageUrl}" class="w-full h-full object-cover group-hover:scale-110 transition duration-500 loading="lazy"">
                        ${art.mood ? `<div class="absolute top-2 left-2 text-2xl bg-white/80 backdrop-blur-sm rounded-full w-10 h-10 flex items-center justify-center shadow-md">${art.mood}</div>` : ''}
                        <div class="absolute top-2 right-2">
                            <button onclick="event.stopPropagation(); toggleFavorite(${art.id})" class="fav-star text-2xl ${isFav ? 'active' : 'text-white/60 hover:text-amber-400'} drop-shadow-lg">${isFav ? '⭐' : '☆'}</button>
                        </div>
                        <div class="absolute inset-0 bg-slate-900/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-3 backdrop-blur-sm">
                            <button class="btn-3d bg-white text-indigo-600 p-3 rounded-xl shadow-[0_4px_0_rgb(203,213,225)]" onclick="event.stopPropagation(); openLightbox(${art.id})"><i class="fa-solid fa-expand"></i></button>
                            <button class="btn-3d bg-white text-red-500 p-3 rounded-xl shadow-[0_4px_0_rgb(203,213,225)]" onclick="event.stopPropagation(); deleteArt(${art.id})"><i class="fa-solid fa-trash"></i></button>
                        </div>
                    </div>
                    <div class="p-2.5 md:p-3 pt-3 md:pt-4">
                        <div class="flex justify-between items-start mb-1.5 gap-2">
                            <h3 class="font-black text-base md:text-lg text-slate-800 truncate">${art.theme}</h3>
                            <span class="text-[10px] md:text-xs font-black px-2 py-1 rounded-lg ${kidObj.color} text-white whitespace-nowrap">${kidObj.icon} ${art.childName}</span>
                        </div>
                        <p class="text-xs font-bold text-slate-400 mb-3"><i class="fa-regular fa-calendar mr-1"></i> ${new Date(art.date).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</p>
                        
                        <div class="flex items-center gap-1 flex-wrap border-t-2 border-slate-50 pt-2.5">
                            ${reactionEmojis.map(emoji => {
                                const count = reactions[emoji] || 0;
                                const isActive = (art.userReactions || []).includes(emoji);
                                return `<button onclick="toggleReaction(${art.id}, '${emoji}', event)" class="reaction-btn flex items-center gap-0.5 text-sm px-1.5 py-0.5 rounded-lg border-2 ${isActive ? 'border-indigo-300 bg-indigo-50' : 'border-transparent hover:bg-slate-50'}">${emoji}${count > 0 ? `<span class="text-xs font-black text-slate-500">${count}</span>` : ''}</button>`;
                            }).join('')}
                        </div>
                    </div>
                </div>`;
            }).join('');
        }

        function toggleReaction(artId, emoji, event) {
            event.stopPropagation(); const art = artworks.find(a => a.id === artId); if (!art) return;
            if (!art.reactions) art.reactions = {}; if (!art.userReactions) art.userReactions = [];
            const idx = art.userReactions.indexOf(emoji);
            if (idx > -1) { art.userReactions.splice(idx, 1); art.reactions[emoji] = Math.max(0, (art.reactions[emoji] || 0) - 1); if (art.reactions[emoji] === 0) delete art.reactions[emoji]; } 
            else { art.userReactions.push(emoji); art.reactions[emoji] = (art.reactions[emoji] || 0) + 1; spawnFlyEmoji(event, emoji); }
            saveArtToDB(art); renderGallery();
        }

        function spawnFlyEmoji(event, emoji) {
            const el = document.createElement('div'); el.className = 'reaction-fly'; el.textContent = emoji;
            el.style.left = (event.clientX - 16) + 'px'; el.style.top = (event.clientY - 16) + 'px';
            document.body.appendChild(el); setTimeout(() => el.remove(), 800);
        }

        function toggleFavorite(artId) {
            const art = artworks.find(a => a.id === artId); if (!art) return;
            art.favorite = !art.favorite; saveArtToDB(art); renderGallery();
        }

        function openLightbox(artId) {
            const art = artworks.find(a => a.id === artId); if (!art) return;
            const kidObj = kids.find(k => k.name === art.childName) || kids[0];
            document.getElementById('lightboxImage').src = art.imageUrl;
            document.getElementById('lightboxTitle').textContent = `${art.mood || ''} ${art.theme}`;
            document.getElementById('lightboxMeta').textContent = `by ${kidObj.icon} ${art.childName} (${kidObj.age} yrs) • ${new Date(art.date).toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' })}`;
            document.getElementById('lightboxModal').classList.remove('hidden');
        }
        function closeLightbox() { document.getElementById('lightboxModal').classList.add('hidden'); }

        function openUploadModal() { document.getElementById('uploadModal').classList.remove('hidden'); }
        function closeUploadModal() { document.getElementById('uploadModal').classList.add('hidden'); document.getElementById('uploadForm').reset(); selectedMood = ''; renderMoodPicker(); clearImagePreview(); document.getElementById('uploadBtn').innerText = "Save to Archive! 🚀"; }

        function renderUploadDropdown() {
            const select = document.getElementById('childSelect'); const actualKids = kids.filter(k => !k.isBase);
            select.innerHTML = actualKids.length === 0 ? `<option value="" disabled selected>Add a child first!</option>` : actualKids.map(k => `<option value="${k.name}">${k.icon} ${k.name} (Age: ${k.age})</option>`).join('');
        }

        document.getElementById('uploadForm').addEventListener('submit', function(e) {
            e.preventDefault(); 
            const file = document.getElementById('artImage').files[0];
            const childName = document.getElementById('childSelect').value;
            if (!childName) return alert("Please add a child profile first!");
            
            if (file) {
                const btn = document.getElementById('uploadBtn');
                btn.innerText = "Uploading to Cloud... ⏳";
                btn.disabled = true;

                const storageRef = storage.ref(`artworks/${Date.now()}_${file.name}`);
                const uploadTask = storageRef.put(file);

                uploadTask.on('state_changed', 
                    (snapshot) => { }, 
                    (error) => { alert("Upload failed: " + error.message); btn.innerText = "Save to Archive! 🚀"; btn.disabled = false; }, 
                    () => {
                        uploadTask.snapshot.ref.getDownloadURL().then((downloadURL) => {
                            const newArt = { 
                                id: Date.now(), 
                                childName, 
                                date: document.getElementById('artDate').value, 
                                theme: document.getElementById('artTheme').value, 
                                imageUrl: downloadURL,
                                mood: selectedMood,
                                reactions: {},
                                userReactions: [],
                                favorite: false
                            };

                            artworks.unshift(newArt);
                            saveArtToDB(newArt);
                            
                            closeUploadModal();
                            setActiveTab(childName);
                            btn.disabled = false;
                            
                            setTimeout(() => { document.getElementById('mainScrollArea').scrollTo({ top: 0, behavior: 'smooth' }); }, 50);
                        });
                    }
                );
            }
        });

        function deleteArt(id) { 
            if(confirm("Delete this masterpiece? 🗑️")) { 
                artworks = artworks.filter(a => a.id !== id); 
                deleteArtFromDB(id);
                renderGallery(); 
            } 
        }

        function openManageModal() { document.getElementById('manageModal').classList.remove('hidden'); }
        function closeManageModal() { document.getElementById('manageModal').classList.add('hidden'); cancelEdit(); }

        function renderManageList() {
            const list = document.getElementById('manageKidsList'); const actualKids = kids.filter(k => !k.isBase);
            list.innerHTML = actualKids.length === 0 ? `<p class="text-slate-400 font-bold text-center py-4">No kids added yet. Add your first artist below! 🎨</p>` : actualKids.map(kid => {
                const artCount = artworks.filter(a => a.childName === kid.name).length;
                return `
                <div class="flex justify-between items-center bg-white border-2 ${editingKidId === kid.id ? 'border-indigo-400 bg-indigo-50' : 'border-slate-100'} p-3 rounded-xl shadow-sm transition-all">
                    <div class="flex items-center gap-3">
                        <div class="w-11 h-11 ${kid.color} rounded-full flex items-center justify-center text-xl text-white shadow-inner shrink-0">${kid.icon}</div>
                        <div>
                            <p class="font-black text-slate-800">${kid.name}</p>
                            <p class="text-[10px] sm:text-xs font-bold text-slate-400">${kid.class} • Age: ${kid.age} • ${artCount} art</p>
                        </div>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="startEditKid('${kid.id}')" class="text-slate-400 hover:text-indigo-500 transition p-2 bg-slate-100 hover:bg-indigo-100 rounded-lg"><i class="fa-solid fa-pen text-sm"></i></button>
                        <button onclick="removeKid('${kid.id}')" class="text-slate-400 hover:text-red-500 transition p-2 bg-slate-100 hover:bg-red-100 rounded-lg"><i class="fa-solid fa-trash text-sm"></i></button>
                    </div>
                </div>`;
            }).join('');
        }

        function startEditKid(id) {
            editingKidId = id; const kid = kids.find(k => k.id === id);
            document.getElementById('newKidName').value = kid.name; document.getElementById('newKidAge').value = kid.age || ''; document.getElementById('newKidClass').value = kid.class;
            selectedEmoji = kid.icon; document.getElementById('newKidEmoji').value = kid.icon; renderEmojiGrid(document.getElementById('emojiSearch').value);
            selectedColor = kid.color; document.getElementById('newKidColor').value = kid.color; renderColorSwatches();
            
            document.getElementById('formTitle').innerHTML = '✏️ Edit Profile';
            document.getElementById('formContainer').classList.remove('border-slate-200', 'bg-slate-50'); document.getElementById('formContainer').classList.add('border-indigo-300', 'bg-indigo-50/50');
            const submitBtn = document.getElementById('submitBtn'); submitBtn.innerHTML = 'Update Profile'; submitBtn.className = 'btn-3d flex-1 bg-indigo-500 text-white font-black py-3 rounded-xl shadow-[0_4px_0_rgb(99,102,241)]';
            document.getElementById('cancelEditBtn').classList.remove('hidden'); renderManageList();
            document.getElementById('formContainer').scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }

        function cancelEdit() {
            editingKidId = null; document.getElementById('addKidForm').reset(); document.getElementById('emojiSearch').value = '';
            selectedEmoji = '👦'; selectedColor = 'bg-red-500'; document.getElementById('newKidEmoji').value = '👦'; document.getElementById('newKidColor').value = 'bg-red-500';
            renderEmojiGrid(); renderColorSwatches();
            document.getElementById('formTitle').innerHTML = '➕ Add New Kid';
            document.getElementById('formContainer').classList.remove('border-indigo-300', 'bg-indigo-50/50'); document.getElementById('formContainer').classList.add('border-slate-200', 'bg-slate-50');
            const submitBtn = document.getElementById('submitBtn'); submitBtn.innerHTML = 'Add to Family'; submitBtn.className = 'btn-3d flex-1 bg-emerald-500 text-white font-black py-3 rounded-xl shadow-[0_4px_0_rgb(16,185,129)]';
            document.getElementById('cancelEditBtn').classList.add('hidden'); renderManageList();
        }

        document.getElementById('addKidForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('newKidName').value.trim(); const colorClass = document.getElementById('newKidColor').value;
            const colorObj = colorOptions.find(c => c.class === colorClass); const shadow = colorObj ? colorObj.shadow : 'shadow-[0_4px_0_rgb(71,85,105)]';
            const updatedData = { name: name, age: document.getElementById('newKidAge').value.trim(), class: document.getElementById('newKidClass').value.trim(), icon: document.getElementById('newKidEmoji').value, color: colorClass, shadow: shadow };

            if (editingKidId) {
                const oldName = kids.find(k => k.id === editingKidId).name;
                kids = kids.map(k => k.id === editingKidId ? { ...k, ...updatedData } : k);
                saveKidToDB(kids.find(k => k.id === editingKidId)); 
                
                artworks.forEach(art => {
                    if(art.childName === oldName) {
                        art.childName = name;
                        saveArtToDB(art);
                    }
                });
                if (activeTab === oldName) activeTab = name; 
            } else { 
                const newKid = { id: 'k_' + Date.now(), isBase: false, ...updatedData };
                kids.push(newKid); 
                saveKidToDB(newKid); 
            }

            cancelEdit(); updateAllUI();
        });

        function removeKid(id) {
            const kid = kids.find(k => k.id === id);
            if(confirm(`Remove ${kid.name}? (Their artwork stays in 'All' but loses their tag)`)) {
                kids = kids.filter(k => k.id !== id);
                if(activeTab === kid.name) activeTab = 'All';
                if(editingKidId === id) cancelEdit();
                deleteKidFromDB(id); 
                updateAllUI();
            }
        }

        document.addEventListener('keydown', (e) => {
            if (e.key === 'Escape') { closeLightbox(); closeUploadModal(); closeManageModal(); }
        });
    </script>
</body>
</html>
